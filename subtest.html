<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sub User Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4 font-sans min-h-screen relative pb-24">

    <!-- Pill-Style Navigation Grid inspired by the reference layout -->
    <div class="grid grid-cols-3 gap-3 mb-6 border-b pb-4 border-slate-200">
        <button id="tab-helps-btn" class="flex flex-col items-center justify-center p-4 bg-white border-2 border-blue-600 text-blue-900 rounded-2xl shadow-sm transition dynamic-tab-pill cursor-pointer">
            <span class="text-xl mb-1">💊</span>
            <span class="text-xs font-black tracking-wide text-center">Medicines / Agent</span>
        </button>
        <button id="tab-grocery-btn" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 text-slate-500 rounded-2xl hover:bg-slate-100 transition dynamic-tab-pill cursor-pointer">
            <span class="text-xl mb-1">🛒</span>
            <span class="text-xs font-bold tracking-wide text-center">Food & Grocery</span>
        </button>
        <button id="tab-orders-btn" class="flex flex-col items-center justify-center p-4 bg-white border border-slate-200 text-slate-500 rounded-2xl hover:bg-slate-100 transition dynamic-tab-pill cursor-pointer">
            <span class="text-xl mb-1">📜</span>
            <span class="text-xs font-bold tracking-wide text-center">My History</span>
        </button>
    </div>

    <!-- Active Panels -->
    <div id="view-helps" class="space-y-4">
        <h3 class="text-xs font-black uppercase tracking-wider text-slate-400 mb-1">Active Medical & Agent Requests</h3>
        <div id="helps-feed-output" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
    <div id="view-grocery" class="hidden space-y-4">
        <h3 class="text-xs font-black uppercase tracking-wider text-slate-400 mb-1">Local Stores Directory</h3>
        <div id="grocery-feed-output" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>
    <div id="view-orders" class="hidden space-y-4">
        <h3 class="text-xs font-black uppercase tracking-wider text-slate-400 mb-1">Completed History Archive</h3>
        <div id="orders-feed-output" class="space-y-3"></div>
    </div>

    <!-- Success Ticket Animation Block Overlay -->
    <div id="success-tick-overlay" class="hidden fixed inset-0 bg-slate-900/70 z-[200] flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-xs">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl font-black mb-4">✓</div>
            <h4 class="text-xl font-black text-slate-900">Request Dispatched!</h4>
            <p class="text-xs text-slate-500 mt-1 leading-relaxed">Logged onto cloud nodes. Realtime tracking will sync automatically.</p>
        </div>
    </div>

    <button id="btn-floating-action" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-full text-2xl font-black shadow-xl flex items-center justify-center cursor-pointer z-40">+</button>

    <!-- Marketplace Purchase Review Context Drawer Modal -->
    <div id="shop-details-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-4xl h-[85vh] shadow-2xl relative flex flex-col lg:flex-row gap-6">
            <button id="btn-close-shop-modal" class="absolute top-4 right-4 text-slate-400 text-xl font-bold cursor-pointer">×</button>
            <div class="flex-1 flex flex-col min-h-0">
                <div class="border-b pb-2 mb-3"><h3 id="modal-shop-name" class="font-black text-slate-900 text-xl">Shop Items</h3><p id="modal-shop-meta" class="text-xs text-slate-400"></p></div>
                <div id="modal-items-grid" class="flex-grow overflow-y-auto space-y-3 grid grid-cols-1 sm:grid-cols-2 gap-3 content-start"></div>
            </div>
            <div class="w-full lg:w-80 border-t lg:border-t-0 lg:border-l pt-4 lg:pt-0 lg:pl-4 flex flex-col justify-between min-h-0">
                <div class="flex flex-col min-h-0 flex-grow overflow-y-auto pr-1 space-y-3">
                    <h4 class="font-black text-slate-800 text-sm uppercase tracking-wider">🛒 Shopping Cart</h4>
                    <div id="cart-items-wrapper" class="space-y-2 text-xs divide-y divide-slate-100"></div>
                    <div class="border-t pt-3 space-y-2 text-xs">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide block mb-1">Confirm Phone Number</label>
                            <input type="tel" id="cart-phone-input" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl font-semibold focus:outline-blue-500 text-slate-800">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide block mb-1">Delivery Address Destination</label>
                            <textarea id="cart-delivery-address-input" rows="2" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:outline-blue-500 text-slate-700" placeholder="Type text address destination..."></textarea>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide block">Pinpoint Delivery Spot on Map</label>
                            <div id="cart-checkout-map" class="h-28 w-full bg-slate-100 rounded-xl border border-slate-200 overflow-hidden relative"></div>
                            <input type="text" id="cart-selected-coords" readonly class="w-full p-1.5 bg-slate-100 text-[9px] font-mono text-slate-500 rounded-lg text-center" placeholder="Click map to lock precise delivery coordinates">
                        </div>
                    </div>
                </div>
                <div class="border-t pt-3 space-y-2">
                    <div class="flex justify-between font-black text-sm text-slate-900"><span>Grand Total Bill:</span><span id="cart-grand-total">₹0</span></div>
                    <p class="text-[10px] text-emerald-600 font-bold bg-emerald-50 p-1.5 rounded text-center">Payment Method: Cash on Delivery (COD) Only</p>
                    <button id="btn-checkout-cart" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold text-xs py-3 rounded-xl transition cursor-pointer">Book Order (Place COD)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Drawer Overlay Container Form Forms Routing Panels -->
    <div id="action-modal-overlay" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-xs z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-lg shadow-2xl relative border max-h-[90vh] overflow-y-auto">
            <button id="btn-close-action-modal" class="absolute top-4 right-4 text-slate-400 text-xl font-bold cursor-pointer">×</button>
            <div class="flex border-b pb-2 mb-4 space-x-4 text-sm font-bold"><button id="form-help-tab" class="text-blue-600 border-b-2 border-blue-600 pb-1">Request Medicine / Agent Help</button><button id="form-shop-tab" class="text-slate-400 pb-1 hidden">Add My Shop</button></div>
            
            <div id="form-help-block" class="space-y-3">
                <input type="text" id="help-fullname" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs font-semibold" placeholder="Your Full Name">
                <div class="h-40 bg-slate-100 rounded-xl overflow-hidden relative" id="map-help-box"></div>
                <input type="text" id="help-coords" readonly class="w-full p-2 bg-slate-100 text-[10px] font-mono rounded-lg">
                <input type="tel" id="help-phone" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs" placeholder="Working Phone Number">
                <textarea id="help-desc" class="w-full p-2.5 bg-slate-50 border rounded-xl text-xs h-16" placeholder="Describe items needed or emergency parameters..."></textarea>
                <button id="btn-submit-help" class="w-full bg-blue-600 text-white text-xs font-bold py-2 rounded-xl cursor-pointer">Post Medicine/Agent Request</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGI7b17RRfpgctXIVIgPtyECtUBLEcMAU",
            authDomain: "skill-bc495.firebaseapp.com",
            databaseURL: "https://skill-bc495-default-rtdb.firebaseio.com",
            projectId: "skill-bc495",
            storageBucket: "skill-bc495.firebasestorage.app",
            messagingSenderId: "53919238872",
            appId: "1:53919238872:web:711de8f103089c653025ad",
            measurementId: "G-6H5D0771NE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const userUid = params.get('uid');
        const userName = params.get('name');
        const userAadharStatus = params.get('identityStatus') || params.get('aadharStatus') || "Unverified";
        const centerLat = parseFloat(params.get('lat')) || 17.3850;
        const centerLng = parseFloat(params.get('lng')) || 78.4867;
        const profileSavedAddress = decodeURIComponent(params.get('savedAddress') || "");
        const userContactPhone = params.get('phone') || "";

        let mapHelp = null, mapCartCheckout = null;
        let markerHelp = null, markerCartCheckout = null;
        let activeCart = [], activeCartShopUid = null, activeCartShopName = null, allShopsCached = {};

        document.getElementById('tab-helps-btn').addEventListener('click', () => switchTab('helps'));
        document.getElementById('tab-grocery-btn').addEventListener('click', () => switchTab('grocery'));
        document.getElementById('tab-orders-btn').addEventListener('click', () => switchTab('orders'));

        function switchTab(t) {
            ['helps', 'grocery', 'orders'].forEach(v => {
                const btn = document.getElementById(`tab-${v}-btn`);
                btn.className = "flex flex-col items-center justify-center p-4 bg-white border border-slate-200 text-slate-500 rounded-2xl hover:bg-slate-100 transition dynamic-tab-pill cursor-pointer";
                document.getElementById(`view-${v}`).classList.add('hidden');
            });
            const activeBtn = document.getElementById(`tab-${t}-btn`);
            activeBtn.className = "flex flex-col items-center justify-center p-4 bg-white border-2 border-blue-600 text-blue-900 rounded-2xl shadow-sm transition dynamic-tab-pill cursor-pointer";
            document.getElementById(`view-${t}`).classList.remove('hidden');
        }

        document.getElementById('btn-floating-action').addEventListener('click', () => {
            if (userAadharStatus !== "Verified") { alert(`Verification Required. Status node: ${userAadharStatus}`); return; }
            document.getElementById('action-modal-overlay').classList.remove('hidden'); 
            initializeFormMaps();
        });

        document.getElementById('btn-close-action-modal').addEventListener('click', () => document.getElementById('action-modal-overlay').classList.add('hidden'));
        document.getElementById('btn-close-shop-modal').addEventListener('click', () => document.getElementById('shop-details-modal').classList.add('hidden'));

        function initializeFormMaps() {
            setTimeout(() => {
                if (!mapHelp) {
                    mapHelp = L.map('map-help-box').setView([centerLat, centerLng], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapHelp);
                    markerHelp = L.marker([centerLat, centerLng], { draggable: true }).addTo(mapHelp);
                    document.getElementById('help-coords').value = `${centerLat}, ${centerLng}`;
                    mapHelp.on('click', (e) => { markerHelp.setLatLng(e.latlng); document.getElementById('help-coords').value = `${e.latlng.lat}, ${e.latlng.lng}`; });
                }
            }, 200);
        }

        document.getElementById('btn-submit-help').addEventListener('click', () => {
            const c = document.getElementById('help-coords').value.split(',');
            const pushRef = push(ref(db, 'helps_posts'));
            set(pushRef, { 
                postId: pushRef.key, 
                uid: userUid, 
                posterName: document.getElementById('help-fullname').value.trim() || userName, 
                phone: document.getElementById('help-phone').value.trim(), 
                desc: document.getElementById('help-desc').value.trim(), 
                lat: parseFloat(c[0]), 
                lng: parseFloat(c[1]), 
                status: "Processing", 
                createdAt: Date.now() 
            })
            .then(() => { 
                document.getElementById('action-modal-overlay').classList.add('hidden');
                triggerAnimatedGreenSuccessTickOverlayGate();
            });
        });

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        // MONITORS ACTIVE MEDICINES / AGENT HELP CALL REQUEST REPLICAS FOR THIS LOGGED UID
        onValue(ref(db, 'helps_posts'), (snapshot) => {
            const feed = document.getElementById('helps-feed-output'); feed.innerHTML = ""; 
            if (!snapshot.exists()) { feed.innerHTML = `<p class="p-4 text-slate-400 text-xs">No active medicine tracking posts.</p>`; return; }
            
            Object.values(snapshot.val()).filter(p => p.uid === userUid).forEach(p => {
                let statusBadgeHtml = `<span class="bg-amber-100 text-amber-700 font-bold px-2.5 py-1 rounded-full uppercase text-[10px]">Processing</span>`;
                if (p.status === "Approved") {
                    statusBadgeHtml = `<span class="bg-green-100 text-green-700 font-bold px-2.5 py-1 rounded-full uppercase text-[10px]">Order Confirmed</span>`;
                } else if (p.status === "Picked Up") {
                    statusBadgeHtml = `<span class="bg-blue-100 text-blue-700 font-bold px-2.5 py-1 rounded-full uppercase text-[10px] animate-pulse">On the Way</span>`;
                }

                let agentBlock = "";
                if(p.agentName) {
                    agentBlock = `<div class="mt-2 p-2 bg-slate-50 border rounded-xl text-slate-600 font-semibold">Assigned Agent: ${p.agentName} (Ph: ${p.agentPhone})</div>`;
                }

                const card = document.createElement('div'); 
                card.className = "p-4 rounded-2xl border text-xs flex flex-col space-y-2 bg-white border-slate-200 shadow-xs";
                card.innerHTML = `
                    <div class="flex justify-between items-center font-bold">
                        <span class="text-slate-800 text-sm">${p.posterName}</span>
                        ${statusBadgeHtml}
                    </div>
                    <p class="text-slate-600 leading-relaxed font-medium">${p.desc}</p>
                    ${agentBlock}
                    <div class="text-[10px] text-slate-400 font-mono">Placed: ${new Date(p.createdAt).toLocaleTimeString()}</div>
                `;
                feed.appendChild(card);
            });
        });

        // MONITORS COMPLETED RUNS AND ORDER TIMELINES ARCHIVE DIRECTORY FOR HISTORY VIEW
        onValue(ref(db, 'orders'), (snapshot) => {
            const container = document.getElementById('orders-feed-output'); container.innerHTML = "";
            if (!snapshot.exists()) { container.innerHTML = `<p class="text-slate-400 text-center py-6 text-xs">No transaction items found.</p>`; return; }
            
            Object.values(snapshot.val()).filter(o => o.uid === userUid).forEach(order => {
                const card = document.createElement('div'); card.className = "p-4 bg-white rounded-2xl border border-slate-200 flex flex-col space-y-2 text-xs relative shadow-xs";
                let badgeClass = "bg-slate-100 text-slate-700";
                let displayState = order.status;

                if (order.status === "Delivered") { badgeClass = "bg-emerald-100 text-emerald-800 font-black"; displayState = "Completed ✔"; }
                else if (order.status === "Cancelled") { badgeClass = "bg-red-100 text-red-700 font-bold"; }
                else if (order.status === "Approved") { badgeClass = "bg-green-100 text-green-700"; displayState = "Order Confirmed"; }
                else if (order.status === "Picked Up") { badgeClass = "bg-blue-100 text-blue-700"; displayState = "On the Way"; }

                let summary = order.items ? order.items.map(i => `${i.title} (x${i.qty})`).join(', ') : "Medical/Agent Emergency Call Run Asset";

                card.innerHTML = `
                    <div class="flex justify-between items-center font-bold">
                        <span class="text-sm text-slate-900">${order.shopName || 'Assistance Request Run'}</span>
                        <span class="px-2 py-0.5 rounded-full text-[10px] uppercase ${badgeClass}">${displayState}</span>
                    </div>
                    <p class="text-slate-600 font-medium"><b>Summary:</b> ${summary}</p>
                    <p class="text-[11px] text-slate-400"><b>Destination:</b> ${order.deliveryAddress || 'GPS Lock Point'}</p>
                    <div class="pt-1 text-[10px] text-slate-400 font-mono">Logged Terminal Time: ${new Date(order.timestamp).toLocaleTimeString()}</div>
                `;
                container.appendChild(card);
            });
        });

        onValue(ref(db, 'approved_shops'), (snapshot) => {
            const feed = document.getElementById('grocery-feed-output'); feed.innerHTML = ""; if (!snapshot.exists()) return;
            allShopsCached = snapshot.val();
            Object.values(allShopsCached).forEach(s => {
                const dist = calculateDistance(centerLat, centerLng, s.lat, s.lng); if (dist > 10 && s.uid !== userUid) return;
                const card = document.createElement('div'); card.className = "bg-white rounded-3xl overflow-hidden border border-slate-200 flex flex-col shadow-xs cursor-pointer shop-card";
                card.setAttribute('data-uid', s.uid);
                card.innerHTML = `<img src="${s.shopImgUrl || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=600'}" class="h-32 w-full object-cover"><div class="p-4"><h4 class="font-black text-sm text-slate-900">${s.shopName}</h4><p class="text-xs text-slate-400">${s.ownerName} (${dist.toFixed(1)} km away)</p></div>`;
                feed.appendChild(card);
            });
            document.querySelectorAll('.shop-card').forEach(c => c.addEventListener('click', () => openShopDetailsModal(allShopsCached[c.getAttribute('data-uid')])));
        });

        function openShopDetailsModal(shop) {
            document.getElementById('modal-shop-name').innerText = shop.shopName;
            document.getElementById('modal-shop-meta').innerText = `Owner: ${shop.ownerName}`;
            activeCartShopUid = shop.uid; activeCartShopName = shop.shopName;
            document.getElementById('cart-delivery-address-input').value = profileSavedAddress;
            document.getElementById('cart-phone-input').value = userContactPhone;
            
            const grid = document.getElementById('modal-items-grid'); grid.innerHTML = "";
            shop.items.forEach((item, idx) => {
                const div = document.createElement('div'); div.className = "bg-slate-50 rounded-2xl p-3 border border-slate-100 flex flex-col justify-between space-y-2";
                div.innerHTML = `
                    <img src="${item.imgUrl || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=300'}" class="h-24 w-full object-cover rounded-xl">
                    <div class="flex justify-between items-center text-xs font-bold"><span class="truncate">${item.title}</span><span class="text-blue-600">${item.price}</span></div>
                    <button class="btn-add-to-cart bg-slate-900 text-white text-[10px] font-black py-1.5 rounded-xl uppercase tracking-wider cursor-pointer shadow-xs" data-title="${item.title}" data-price="${item.price}">Add to Cart</button>
                `;
                grid.appendChild(div);
            });
            document.querySelectorAll('.btn-add-to-cart').forEach(btn => btn.addEventListener('click', (e) => addItemToCartArray(e.target.getAttribute('data-title'), e.target.getAttribute('data-price'))));
            document.getElementById('shop-details-modal').classList.remove('hidden');
            initializeCartCheckoutDeliveryMap();
        }

        function initializeCartCheckoutDeliveryMap() {
            setTimeout(() => {
                if (!mapCartCheckout) {
                    mapCartCheckout = L.map('cart-checkout-map').setView([centerLat, centerLng], 16); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapCartCheckout);
                    markerCartCheckout = L.marker([centerLat, centerLng]).addTo(mapCartCheckout);
                    document.getElementById('cart-selected-coords').value = `${centerLat}, ${centerLng}`;
                    mapCartCheckout.on('click', (e) => { markerCartCheckout.setLatLng(e.latlng); document.getElementById('cart-selected-coords').value = `${e.latlng.lat}, ${e.latlng.lng}`; });
                } else { mapCartCheckout.setView([centerLat, centerLng], 16); markerCartCheckout.setLatLng([centerLat, centerLng]); mapCartCheckout.invalidateSize(); }
            }, 250);
        }

        function addItemToCartArray(title, price) {
            const numericPrice = parseInt(price.replace(/[^0-9]/g, '')) || 0;
            const existing = activeCart.find(i => i.title === title);
            if (existing) { existing.qty++; } else { activeCart.push({ title, price: numericPrice, qty: 1 }); }
            renderCartInterfaceView();
        }

        function renderCartInterfaceView() {
            const wrap = document.getElementById('cart-items-wrapper'); wrap.innerHTML = "";
            if (activeCart.length === 0) { wrap.innerHTML = `<p class="text-slate-400 text-center py-4">Your cart is empty.</p>`; document.getElementById('cart-grand-total').innerText = "₹0"; return; }
            let total = 0;
            activeCart.forEach((item, index) => {
                const cost = item.price * item.qty; total += cost;
                const row = document.createElement('div'); row.className = "flex justify-between items-center py-2 text-xs text-slate-700 border-b border-slate-50";
                row.innerHTML = `<div><span class="font-bold">${item.title}</span><div class="flex items-center space-x-2 mt-1"><button class="btn-cart-minus bg-slate-200 text-slate-700 px-1.5 rounded font-black cursor-pointer" data-idx="${index}">-</button><span class="font-mono font-bold">${item.qty}</span><button class="btn-cart-plus bg-slate-200 text-slate-700 px-1.5 rounded font-black cursor-pointer" data-idx="${index}">+</button></div></div><span class="font-mono font-bold">₹${cost}</span>`;
                wrap.appendChild(row);
            });
            document.getElementById('cart-grand-total').innerText = `₹${total}`;
            document.querySelectorAll('.btn-cart-minus').forEach(b => b.addEventListener('click', (e) => { const idx = parseInt(e.target.getAttribute('data-idx')); if(activeCart[idx].qty > 1) activeCart[idx].qty--; else activeCart.splice(idx, 1); renderCartInterfaceView(); }));
            document.querySelectorAll('.btn-cart-plus').forEach(b => b.addEventListener('click', (e) => { activeCart[parseInt(e.target.getAttribute('data-idx'))].qty++; renderCartInterfaceView(); }));
        }

        function triggerAnimatedGreenSuccessTickOverlayGate() {
            const overlay = document.getElementById('success-tick-overlay'); overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.add('hidden'); switchTab('helps'); }, 3000);
        }

        document.getElementById('btn-checkout-cart').addEventListener('click', () => {
            if (activeCart.length === 0) return;
            const deliveryDestinationStr = document.getElementById('cart-delivery-address-input').value.trim();
            const contactPhone = document.getElementById('cart-phone-input').value.trim();
            const selectedCoords = document.getElementById('cart-selected-coords').value.split(',');
            if(!deliveryDestinationStr || !contactPhone || selectedCoords.length !== 2) { alert("Fill inputs and select pinpoint location."); return; }
            const totalBill = document.getElementById('cart-grand-total').innerText;
            const pushOrderRef = push(ref(db, 'orders'));
            
            set(pushOrderRef, {
                orderId: pushOrderRef.key, uid: userUid, userName, shopUid: activeCartShopUid, shopName: activeCartShopName,
                items: activeCart, totalBill, status: "Processing", deliveryAddress: deliveryDestinationStr, userPhone: contactPhone,
                lat: parseFloat(selectedCoords[0]), lng: parseFloat(selectedCoords[1]), timestamp: Date.now()
            }).then(() => { activeCart = []; renderCartInterfaceView(); document.getElementById('shop-details-modal').classList.add('hidden'); triggerAnimatedGreenSuccessTickOverlayGate(); });
        });
    </script>
</body>
</html>
